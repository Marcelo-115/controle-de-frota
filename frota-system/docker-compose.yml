version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: frota
      POSTGRES_PASSWORD: frota123
      POSTGRES_DB: frota_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frota -d frota_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
